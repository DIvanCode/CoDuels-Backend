name: Analyzer checks

on:
  pull_request:
    branches: [master]
    paths:
      - Analyzer/**
      - .github/workflows/analyzer_pull_request.yml

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        working-directory: Analyzer
        run: python -m pip install -r requirements.txt
      - name: Check Python syntax
        working-directory: Analyzer
        run: python -m compileall -q .
      - name: Train baseline and production models
        working-directory: Analyzer
        run: python train.py --data-dir data/train

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up python and ansible
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          cd Analyzer
          pip3 install -r requirements.txt
          pip3 install ansible docker
      - name: Train baseline and production models
        run: |
          cd Analyzer
          python3 train.py --data-dir data/train
          ls -lah artifacts
      - name: Log in to docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u divancode74 --password-stdin
      - name: Run ansible build playbook
        run: |
          cd Analyzer/ansible/build
          ansible-playbook -i inventory playbook.yml \
            --extra-vars="version=${{ github.sha }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: production-analyzer
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up python and ansible
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip3 install ansible docker
      - name: Run ansible deploy playbook
        run: |
          cd Analyzer/ansible/deploy
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory playbook.yml \
            --extra-vars="version=${{ github.sha }} ansible_user=root ansible_password=${{ secrets.SSH_PASSWORD }}"
