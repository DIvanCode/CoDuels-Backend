networks:
  coduels:
    name: coduels
    driver: bridge
    external: true

volumes:
  postgres:

services:
  postgres:
    image: postgres:17.7
    container_name: exesh_postgres
    networks:
      - coduels
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: coordinator
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: exesh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coordinator"]
      interval: 1s
      timeout: 0s
      retries: 30
    volumes:
      - postgres:/var/lib/postgresql/data

  coordinator:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /app/bin/coordinator
    container_name: coordinator
    networks:
      - coduels
    ports:
      - "5253:5253"
      - "9080:9090"
    environment:
      CONFIG_PATH: /config/coordinator.yml
      ENV: docker
      HTTP_SERVER_ADDR: 0.0.0.0:5253
      HTTP_SERVER_METRICS_ADDR: 0.0.0.0:9090
      JOB_FACTORY_FILESTORAGE_ENDPOINT: http://coordinator:5253
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/config:ro
  
  worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /app/bin/worker
    container_name: worker-1
    networks:
      - coduels
    ports:
      - "5254:5254"
      - "9081:9091"
    environment:
      CONFIG_PATH: /config/worker.yml
      ENV: docker
      HTTP_SERVER_ADDR: 0.0.0.0:5254
      HTTP_SERVER_METRICS_ADDR: 0.0.0.0:9091
      FILE_STORAGE_ROOT_DIR: file_storage/worker-1
      WORKER_ID: http://worker-1:5254
      WORKER_COORDINATOR_ENDPOINT: http://coordinator:5253
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/config:ro
      - ./config/isolate.conf:/usr/local/etc/isolate:ro

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /app/bin/worker
    container_name: worker-2
    networks:
      - coduels
    ports:
      - "5255:5255"
      - "9082:9092"
    environment:
      CONFIG_PATH: /config/worker.yml
      ENV: docker
      HTTP_SERVER_ADDR: 0.0.0.0:5255
      HTTP_SERVER_METRICS_ADDR: 0.0.0.0:9092
      FILE_STORAGE_ROOT_DIR: file_storage/worker-2
      WORKER_ID: http://worker-2:5255
      WORKER_COORDINATOR_ENDPOINT: http://coordinator:5253
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/config:ro
      - ./config/isolate.conf:/usr/local/etc/isolate:ro

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: exesh-dashboard
    networks:
      - coduels
    ports:
      - "9000:9000"
    environment:
      EXESH_DASHBOARD_DB_HOST: exesh_postgres
      EXESH_DASHBOARD_DB_PORT: "5432"
      EXESH_DASHBOARD_DB_NAME: exesh
      EXESH_DASHBOARD_DB_USER: coordinator
      EXESH_DASHBOARD_DB_PASSWORD: secret
    depends_on:
      postgres:
        condition: service_healthy
