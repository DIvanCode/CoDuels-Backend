name: Taski

on:
  pull_request:
    paths:
      - Taski/**

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "^1.24.0"
      - name: Run tests
        run: |
          cd Taski
          go test -v ./...