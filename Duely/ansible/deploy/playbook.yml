- name: Deploy
  hosts: Production
  vars_files:
    - "{{ credentials_file | default('credentials.yml') }}"
  remote_user: root
  tasks:
    - name: Ensure network exists
      docker_network:
        name: coduels
        state: present
    - name: Pull duely-migration image
      docker_image:
        name: divancode74/coduels-duely-migration
        tag: "{{ version }}"
        source: pull
        force_source: true
    - name: Pull duely image
      docker_image:
        name: divancode74/coduels-duely
        tag: "{{ version }}"
        source: pull
        force_source: true
    - name: Run duely-migration container
      docker_container:
        name: duely-migration
        image: "divancode74/coduels-duely-migration:{{ version }}"
        recreate: yes
        cleanup: true
        detach: false
        env:
          DbConnection__ConnectionString: "{{ postgres_connection }}"
        command: |
          bash -c '/root/.dotnet/tools/dotnet-ef database update \
          --connection "$DbConnection__ConnectionString" \
          --startup-project /app/src/Duely \
          --project /app/src/Duely.Infrastructure.DataAccess.EntityFramework'
      register: migration_result
    - name: Fail if migration failed
      fail:
        msg: "Migration failed!"
      when: migration_result.status != 0
    - name: Run duely container
      docker_container:
        name: duely
        image: "divancode74/coduels-duely:{{ version }}"
        recreate: yes
        restart: yes
        restart_policy: unless-stopped
        state: healthy
        healthy_wait_timeout: 120
        healthcheck:
          test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5001'"]
          interval: 5s
          timeout: 3s
          retries: 12
          start_period: 20s
        env:
          ASPNETCORE_ENVIRONMENT: "Production"
          DbConnection__ConnectionString: "{{ postgres_connection }}"
          JwtToken__SecretKey: "{{ jwt_secret_key }}"
          Taski__BaseUrl: http://taski:5252
          Exesh__BaseUrl: http://coordinator:5253
          Analyzer__BaseUrl: http://analyzer:8000
          Kafka__SaslPassword: "{{ kafka_password }}"
          Kafka__GroupId: taski.testing-group
        networks:
          - name: coduels
    - name: Inspect duely rollout
      docker_container_info:
        name: duely
      register: duely_container
    - name: Verify duely is healthy and private
      assert:
        that:
          - duely_container.container.State.Health.Status == "healthy"
          - (duely_container.container.HostConfig.PortBindings | default({}, true) | length) == 0
          - "'coduels' in duely_container.container.NetworkSettings.Networks"
