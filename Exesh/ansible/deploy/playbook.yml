- name: Deploy
  hosts: Production
  vars_files:
    - "{{ credentials_file | default('credentials.yml') }}"
  remote_user: root
  tasks:
    - name: Ensure network exists
      docker_network:
        name: coduels
        state: present
    - name: Pull coordinator image
      docker_image:
        name: divancode74/coduels-exesh
        tag: "{{ version }}"
        source: pull
        force_source: true
    - name: Pull dashboard image
      docker_image:
        name: divancode74/coduels-exesh-dashboard
        tag: "{{ version }}"
        source: pull
        force_source: true
    - name: Run coordinator container
      docker_container:
        name: coordinator
        image: "divancode74/coduels-exesh:{{ version }}"
        recreate: yes
        restart: yes
        restart_policy: unless-stopped
        state: healthy
        healthy_wait_timeout: 120
        healthcheck:
          test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5253'"]
          interval: 5s
          timeout: 3s
          retries: 12
          start_period: 10s
        command:
          - /app/bin/coordinator
        env:
          ENV: prod
          CONFIG_PATH: /app/config/coordinator.yml
          STORAGE_CONNECTION_STRING: "{{ coordinator_postgres_connection }}"
          HTTP_SERVER_ADDR: 0.0.0.0:5253
          HTTP_SERVER_METRICS_ADDR: 0.0.0.0:9090
          JOB_FACTORY_FILESTORAGE_ENDPOINT: http://coordinator:5253
          DISPATCHER_KAFKA_ENABLED: "false"
          DISPATCHER_BROKERS: "192.168.0.6:19092"
          DISPATCHER_SASL_AUTH: "true"
          DISPATCHER_SASL_USERNAME: coordinator
          DISPATCHER_SASL_PASSWORD: "{{ kafka_password }}"
        networks:
          - name: coduels
    - name: Run worker-1 container
      docker_container:
        name: worker-1
        image: "divancode74/coduels-exesh:{{ version }}"
        recreate: yes
        restart: yes
        restart_policy: unless-stopped
        state: healthy
        healthy_wait_timeout: 120
        healthcheck:
          test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5254'"]
          interval: 5s
          timeout: 3s
          retries: 12
          start_period: 10s
        command:
          - /app/bin/worker
        privileged: true
        env:
          ENV: prod
          CONFIG_PATH: /app/config/worker.yml
          HTTP_SERVER_ADDR: 0.0.0.0:5254
          HTTP_SERVER_METRICS_ADDR: 0.0.0.0:9091
          FILE_STORAGE_ROOT_DIR: /file_storage/worker-1
          WORKER_ID: http://worker-1:5254
          WORKER_FREE_SLOTS: "4"
          WORKER_AVAILABLE_MEMORY_MB: "2048"
          WORKER_COORDINATOR_ENDPOINT: http://coordinator:5253
        networks:
          - name: coduels
    - name: Run worker-2 container
      docker_container:
        name: worker-2
        image: "divancode74/coduels-exesh:{{ version }}"
        recreate: yes
        restart: yes
        restart_policy: unless-stopped
        state: healthy
        healthy_wait_timeout: 120
        healthcheck:
          test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5255'"]
          interval: 5s
          timeout: 3s
          retries: 12
          start_period: 10s
        command:
          - /app/bin/worker
        privileged: true
        env:
          ENV: prod
          CONFIG_PATH: /app/config/worker.yml
          HTTP_SERVER_ADDR: 0.0.0.0:5255
          HTTP_SERVER_METRICS_ADDR: 0.0.0.0:9092
          FILE_STORAGE_ROOT_DIR: /file_storage/worker-2
          WORKER_ID: http://worker-2:5255
          WORKER_FREE_SLOTS: "4"
          WORKER_AVAILABLE_MEMORY_MB: "2048"
          WORKER_COORDINATOR_ENDPOINT: http://coordinator:5253
        networks:
          - name: coduels
    - name: Run dashboard container
      docker_container:
        name: dashboard
        image: "divancode74/coduels-exesh-dashboard:{{ version }}"
        recreate: yes
        restart: yes
        restart_policy: unless-stopped
        state: healthy
        healthy_wait_timeout: 120
        healthcheck:
          test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=2)"]
          interval: 5s
          timeout: 3s
          retries: 12
          start_period: 10s
        env:
          EXESH_DASHBOARD_DB_CONNECTION_STRING: "{{ dashboard_postgres_connection }}"
        networks:
          - name: coduels
    - name: Inspect Exesh rollout
      docker_container_info:
        name: "{{ item }}"
      loop:
        - coordinator
        - worker-1
        - worker-2
        - exesh-dashboard
      register: exesh_containers
    - name: Verify Exesh containers are healthy and private
      assert:
        that:
          - item.container.State.Health.Status == "healthy"
          - (item.container.HostConfig.PortBindings | default({}, true) | length) == 0
          - "'coduels' in item.container.NetworkSettings.Networks"
      loop: "{{ exesh_containers.results }}"
      loop_control:
        label: "{{ item.container.Name }}"
